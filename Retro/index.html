<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroGadget Tools</title>

    <script src="convert.js" defer></script>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <input type="file" id="image_input" accept="image/png, image/jpg">
    <br>
    <img id="display_image">
    
    <div id="output_config">
        <label>Width:</label> <input type="number" id="output_width">
        <label>Height:</label> <input type="number" id="output_height">
        
        <button id="output_button" onclick="convert()">Convert</button>
    </div>
    

</body>
</html>
