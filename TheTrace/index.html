<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./TheTrace.css">
    <title> Index </title>
</head>

<body>
    
    <img src="./Capital.png" class="object" data-speed="2.8">
    <img src="./Offshoot.png" class="object" data-speed="3">
    <img src="./Right.png" class="object" data-speed="3">
    <img src="./Top.png" class="object" data-speed="3.4">
    <img src="./Core.png" class="object" data-speed="4">
    <img src="./Left.png" class="object" data-speed="4.8">
    <img src="./Bottom.png" class="object" data-speed="4.8">
    <img src="./Australia.png" class="object" data-speed="5.8">
    


    <script type="text/javascript">
        document.addEventListener("mousemove", parallax)

        function parallax(e){
            document.querySelectorAll(".object").forEach(function(move){
                
 
                var speed = move.getAttribute("data-speed");
                var x = window.innerWidth - e.pageX * speed;
                var y = window.innerHeight - e.pageY * speed; 

                move.style.transform =`translate(${x / 20}px, ${y / 20}px)`;
            });
        }

    </script>
</body>

</html>
