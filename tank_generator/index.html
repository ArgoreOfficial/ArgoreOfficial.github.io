<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprocket Tank Generator</title>

    <script src="//cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script src="./main.js" defer></script>
    <script src="./selectors.js" defer></script>
    <script src="./generator.js" defer></script>

    <link rel="stylesheet" href="./main.css">
    <link rel="stylesheet" href="./selectors.css">
</head>
<body class="compact">
    <div id="settings">
        <div id="settings_toggle"></div>

        <div class="select_menu" id="type_selector">
            <div data-option="random"> <p> Random </p> </div>
            <div data-option="tank"> <p> Tank </p> </div>
            <div data-option="tank_destroyer"> <p> Tank Destroyer </p> </div>
            <div data-option="assault_gun"> <p> Assault Gun </p> </div>
            <div data-option="armoured_car"> <p> Armoured Car </p> </div>
        </div>
        
        <div class="select_menu" id="variant_selector">
            <div data-option="random"> <p> Random </p> </div>
            <div data-option="superlight"> <p> Superlight </p> </div>
            <div data-option="light"> <p> Light </p> </div>
            <div data-option="medium"> <p> Medium </p> </div>
            <div data-option="heavy"> <p> Heavy </p> </div>
            <div data-option="superheavy"> <p> Superheavy </p> </div>
        </div>
    </div>
    <div id="generation">
        <div id="settings_button" onclick="toggle_settings()"> <p> Settings </p> </div>
        <div id="generate_button"> <p> Generate </p> </div>
        
        <p id="result"></p>
    </div>


</body>
</html>
