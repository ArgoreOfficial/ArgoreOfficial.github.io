<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprocket Tank Generator</title>

    <script src="//cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <script src="./generator.js" defer></script>
    <link rel="stylesheet" href="./dropdown.css">
</head>
<body>
    
    <label for="vehicletype">Vehicle Type:</label>
    <select name="variant" id="variant">
        <option value="tank">Tank</option>
        <option value="tank_destroyer">Tank Destroyer</option>
        <option value="assault_gun">Assault Gun</option>
        <option value="armoured_car">Armoured Car</option>
    </select>

    <br>
    
    <label for="variant">Variant:</label>
    <select name="variant" id="variant_select">
        <option value="random">Random</option>
        <option value="superlight">Superlight</option>
        <option value="light">Light</option>
        <option value="medium">Medium</option>
        <option value="heavy">Heavy</option>
        <option value="superheavy">Superheavy</option>
    </select>

    <br><br>
    <input type="submit" value="Generate" id="generate_button">

    <pre id="result"></pre>
</body>
</html>
